platform: kmp
contract_version: "1.0"
display_name: KMP
governs_addons: true

routing_signals:
  strong:
    - 'kotlin("multiplatform")'
    - "org.jetbrains.kotlin.multiplatform"
    - "androidMain"
    - "iosMain"
    - "commonMain"
    - "AndroidManifest.xml"
    - "expect"
    - "actual"
  tie_breakers:
    - "If KMP or Android markers are strong, prefer this pack over generic Kotlin."
    - "Treat Android-only scope as KMP."
    - "If mixed with generic Kotlin, prefer this pack because it layers the Kotlin baseline internally."
  addon_signals:
    - "android-compose"
    - "android-navigation"
    - "android-interop"
    - "android-design-system"
    - "android-r8"

declared_code_review_areas:
  - ui
  - ux-accessibility

declared_files:
  baseline: code-review/bill-kmp-code-review/SKILL.md
  areas:
    ui: code-review/bill-kmp-code-review-ui/SKILL.md
    ux-accessibility: code-review/bill-kmp-code-review-ux-accessibility/SKILL.md

declared_addons:
  - slug: android-compose
    implementation: addons/android-compose-implementation.md
    review: addons/android-compose-review.md
    topic_files:
      - addons/android-compose-edge-to-edge.md
      - addons/android-compose-adaptive-layouts.md
  - slug: android-navigation
    implementation: addons/android-navigation-implementation.md
    review: addons/android-navigation-review.md
  - slug: android-interop
    implementation: addons/android-interop-implementation.md
    review: addons/android-interop-review.md
  - slug: android-design-system
    implementation: addons/android-design-system-implementation.md
    review: addons/android-design-system-review.md
  - slug: android-r8
    implementation: addons/android-r8-implementation.md
    review: addons/android-r8-review.md
